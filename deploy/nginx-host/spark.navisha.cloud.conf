# ============================================
# Nginx Host Config for spark.navisha.cloud
# Deploy to: /etc/nginx/sites-available/spark.navisha.cloud
# Enable: ln -s /etc/nginx/sites-available/spark.navisha.cloud /etc/nginx/sites-enabled/
# ============================================

# Rate limiting for /trigger endpoint
limit_req_zone $binary_remote_addr zone=trigger_spark:10m rate=5r/m;

server {
    listen 80;
    server_name spark.navisha.cloud;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name spark.navisha.cloud;

    # SSL certificates (managed by Certbot on host)
    ssl_certificate /etc/letsencrypt/live/spark.navisha.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spark.navisha.cloud/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Logging
    access_log /var/log/nginx/spark.navisha.cloud.access.log;
    error_log /var/log/nginx/spark.navisha.cloud.error.log;

    # Health check — public
    location /healthz {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Trigger — rate limited
    location /trigger {
        limit_req zone=trigger_spark burst=2 nodelay;

        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeout for trigger (insight generation can take time)
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Root — public
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
