# Navisha Spark — Unified Configuration
# Edit this file and changes will hot-reload automatically (no restart needed)

# ============================================
# Application
# ============================================
app:
  name: "navisha-spark"
  env: "production"
  port: 8080
  log_level: "info"

# ============================================
# Telegram
# ============================================
telegram:
  bot_token: ""              # Override via TELEGRAM_BOT_TOKEN env
  chat_id: 0                 # Override via TELEGRAM_CHAT_ID env
  parse_mode: "Markdown"
  disable_web_page_preview: true
  disable_notification: false

# ============================================
# Database (Supabase PostgreSQL)
# ============================================
database:
  url: ""                    # Override via DATABASE_URL env
  max_open_conns: 10
  max_idle_conns: 5
  conn_max_lifetime: 5m

# ============================================
# LLM / Content Generation (OpenRouter)
# ============================================
llm:
  api_key: ""                # Override via OPENROUTER_API_KEY env
  model: "openrouter/owl-alpha"
  max_tokens: 1000
  temperature: 0.7
  primary_source: "database"
  fallback_source: "llm"

# ============================================
# Schedule
# ============================================
schedule:
  cron: "0 */3 * * *"        # Every 3 hours
  timezone: "Asia/Jakarta"
  active_hours:
    start: 0                  # 00:00 WIB
    end: 23                   # 23:00 WIB

# ============================================
# Rotation & Spaced Repetition
# ============================================
rotation:
  level_distribution:
    beginner: 20
    intermediate: 50
    advanced: 30
  min_days_before_repeat: 7
  weighted_round_robin:
    enabled: true
    default_weight: 1.0

# ============================================
# Deduplication
# ============================================
deduplication:
  window_hours: 24

# ============================================
# Retry
# ============================================
retry:
  max_retries: 3
  delays:
    - 1m
    - 5m
    - 15m

# ============================================
# Message Format
# ============================================
format:
  include_category: true
  include_level: true
  include_follow_ups: true
  include_tags: true
  markdown_enabled: true

# ============================================
# Logging
# ============================================
logging:
  level: "info"              # debug, info, warn, error
  format: "json"             # json or text

