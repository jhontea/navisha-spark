# Global settings
settings:
  # Level distribution: beginner%, intermediate%, advanced%
  level_distribution:
    beginner: 20
    intermediate: 50
    advanced: 30

  # Minimum days before repeating the same question
  min_days_before_repeat: 7

  # Deduplication window (hours)
  dedup_window_hours: 24